<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <title>Paint the car</title>
</head>
<body>
    <aside class="sidebar">
        <h2>Tools</h2>
        <section class="tools">
            <button id="pencil" class="tool" title="Pencil" aria-label="Pencil tool" tabindex="0">Pencil</button>
            <button id="eraser" class="tool" title="Eraser" aria-label="Eraser tool" tabindex="0">Eraser</button>
            <button id="text" class="tool" title="Text" aria-label="Text tool" tabindex="0">Text</button>
            <button id="select" class="tool" title="Select" aria-label="Select tool" tabindex="0">Select</button>
        </section>
        <h3>Shapes</h3>
        <section class="shapes">
            <button id="square" class="tool" title="Square" aria-label="Square tool" tabindex="0">Square</button>
            <button id="circle" class="tool" title="cirle" aria-label="Square tool" tabindex="0">Circle</button>
            <button id="line" class="tool" title="line" aria-label="Square tool" tabindex="0">Line</button>
            <br>
            <label>Fill shapes?<input type="checkbox" id="fill-checkbox"></label>

        </section>
        <h3>Color</h3>
        <label for="color-picker">
            Stroke color
            <input type="color" id="color-picker" value="#ffffff">
        </label>
        <label for="fill-color-picker">
            Fill color
            <input type="color" id="fill-color-picker" value="#ffffff">
        </label>
        <label for="thickness">
            Stroke thickness
            <input type="range" id="thickness" min="0" max="100" value=10">
        </label>
        <h3>Background color</h3>
        <label for="color-picker">
            <input type="color" id="bg-picker" value="#ffffff">
        </label>
        <button id="theme-toggle" class="tool">Toggle Theme</button>
        <button class="clear-btn" id="clearCanvas">Clear Canvas</button>
        <button class="clear-btn" id="permanent_clearCanvas">Permanently Clear Canvas</button>


    </aside>
    <main class="main">
        <canvas id="canvas"></canvas>
        <canvas id="preview_canvas" tabindex="0"></canvas>
        <img id="eraser-cursor" src="images/circle.png" alt="none">
    </main>
    <script src="index.js"></script>
</body>
</html>
